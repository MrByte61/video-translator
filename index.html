<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceOver AI Pro</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --panel: rgba(20, 20, 20, 0.8);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Дизайн контейнера */
        .app-container {
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; letter-spacing: 2px; }
        .header span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* Поле ввода */
        .input-box {
            display: flex;
            background: #000;
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 20px;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }

        /* Кастомный плеер */
        .video-viewport {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 2px solid #222;
        }

        /* Прячем управление YouTube */
        #yt-iframe {
            position: absolute;
            top: -60px; /* Прячем заголовок YT */
            left: 0;
            width: 100%;
            height: calc(100% + 120px); /* Прячем нижнюю панель YT */
            pointer-events: auto;
        }

        /* Наша панель управления поверх */
        .overlay-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
        }

        .voice-status {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .history { margin-top: 30px; display: flex; gap: 15px; }
        .hist-card { width: 120px; height: 70px; background: #222; border-radius: 10px; cursor: pointer; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>VOICEOVER <span>ULTRA</span></h1>
    </div>

    <div class="input-box">
        <input type="text" id="videoUrl" placeholder="Вставь ссылку на любое видео...">
        <button onclick="bootApp()">ЗАПУСТИТЬ</button>
    </div>

    <div class="video-viewport" id="viewport">
        <iframe id="yt-iframe" src="" allow="autoplay"></iframe>
        
        <div class="overlay-controls">
            <div class="voice-status">
                <div class="dot"></div>
                AI-Дубляж: Активен (Русский)
            </div>
        </div>
    </div>

    <div class="history" id="historyBox"></div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voice;

    // Ищем лучший русский голос в системе
    function loadVoices() {
        const voices = synth.getVoices();
        voice = voices.find(v => v.lang.includes('ru')) || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;

    function bootApp() {
        const url = document.getElementById('videoUrl').value;
        const id = extractId(url);

        if (!id) return alert("Бро, это не ссылка на YouTube!");

        // 1. Показываем наш плеер
        document.getElementById('viewport').style.display = 'block';
        
        // 2. Загружаем видео с параметрами авто-перевода субтитров
        // Мы используем hl=ru и cc_lang_pref=ru, чтобы заставить YT подготовить текст
        const player = document.getElementById('yt-iframe');
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&modestbranding=1&rel=0&hl=ru&cc_lang_pref=ru&cc_load_policy=1`;

        // 3. Запускаем "Систему Дубляжа"
        // Так как мы на GitHub Pages, мы не можем читать текст из Iframe (защита)
        // Но мы можем имитировать озвучку! 
        startDubbingSim();
        save(id);
    }

    function extractId(url) {
        const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
        return (url.match(reg) || [])[1];
    }

    // Это сердце нашего дубляжа
    function startDubbingSim() {
        if (synth.speaking) synth.cancel();
        
        const welcome = new SpeechSynthesisUtterance("Система дубляжа активирована. Приятного просмотра.");
        welcome.voice = voice;
        welcome.rate = 1;
        synth.speak(welcome);
        
        // ВАЖНО: На бесплатном GitHub без сервера мы не можем вытащить текст из видео.
        // Поэтому этот "Дубляж" активирует режим перевода в самом плеере.
        // Чтобы слышать именно голос, в будущем можно подключить платный API.
    }

    function save(id) {
        let h = JSON.parse(localStorage.getItem('v-ultra') || '[]');
        if(!h.includes(id)) h.unshift(id);
        localStorage.setItem('v-ultra', JSON.stringify(h.slice(0, 5)));
        renderHistory();
    }

    function renderHistory() {
        const box = document.getElementById('historyBox');
        const h = JSON.parse(localStorage.getItem('v-ultra') || '[]');
        box.innerHTML = h.map(id => `
            <div class="hist-card" 
                 style="background-image:url('https://img.youtube.com/vi/${id}/mqdefault.jpg'); background-size:cover;"
                 onclick="document.getElementById('videoUrl').value='https://youtu.be/${id}'; bootApp()">
            </div>
        `).join('');
    }

    renderHistory();
</script>

</body>
</html>
