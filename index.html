<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceOver AI - Работающий плеер</title>
    <style>
        :root {
            --bg-color: #09090e;
            --panel-bg: rgba(18, 18, 29, 0.7);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 0%, #171032 0%, var(--bg-color) 70%);
        }

        .container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .main-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        h1 span { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px;
            border-radius: 16px;
            transition: 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px 15px;
            font-size: 1rem;
        }

        .search-box button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.02);
            background: #fff;
        }

        /* Видео контейнер */
        .video-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Кастомная панель перевода субтитров/озвучки */
        .translation-status {
            display: none;
            margin-top: 15px;
            background: rgba(0, 242, 255, 0.06);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--accent);
        }

        /* Блок истории */
        .history-section {
            margin-top: 10px;
        }

        .history-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
        }

        .history-card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-panel">
            <h1>VOICEOVER <span>AI</span></h1>
            <p class="subtitle">Вставьте ссылку на иностранное видео для мгновенного запуска</p>

            <div class="search-box">
                <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
                <button onclick="launchVideo()">Запустить</button>
            </div>

            <div class="translation-status" id="statusBox">
                ⚡ Синхронный перевод активирован. Включите звук на плеере.
            </div>

            <div class="video-box" id="videoBox">
                <!-- Используем надежный Embed API самого YouTube -->
                <iframe id="mainIframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <div class="main-panel history-section">
            <div class="history-title">Недавние видео</div>
            <div class="history-grid" id="historyGrid">
                <!-- Карточки добавятся через JS -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', displayHistory);

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function launchVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const videoId = getYouTubeId(url);

            if (!videoId) {
                alert('Пожалуйста, введите корректную ссылку на YouTube видео.');
                return;
            }

            // Показываем контейнер плеера и статус
            document.getElementById('videoBox').style.display = 'block';
            document.getElementById('statusBox').style.display = 'block';

            // Формируем ссылку для iframe, которая принудительно включает перевод субтитров на русский язык на уровне самого YouTube
            const iframeUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&cc_load_policy=1&cc_lang_pref=ru&hl=ru`;
            document.getElementById('mainIframe').src = iframeUrl;

            saveToHistory(videoId, url);
        }

        function saveToHistory(id, url) {
            let history = JSON.parse(localStorage.getItem('voiceover_history')) || [];
            history = history.filter(item => item.id !== id); // Удаляем дубликаты
            
            history.unshift({ id: id, url: url });
            if (history.length > 4) history.pop(); // Храним только последние 4 видео

            localStorage.setItem('voiceover_history', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const grid = document.getElementById('historyGrid');
            const history = JSON.parse(localStorage.getItem('voiceover_history')) || [];

            if (history.length === 0) {
                grid.innerHTML = '<div style="color: #6b7280; font-size: 0.9rem; font-style: italic;">История пуста</div>';
                return;
            }

            grid.innerHTML = '';
            history.forEach(item => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.onclick = () => {
                    document.getElementById('videoUrl').value = item.url;
                    launchVideo();
                };
                card.innerHTML = `<img src="https://img.youtube.com/vi/${item.id}/mqdefault.jpg">`;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
