<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceOver Pro - Свой плеер</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {
            --bg-color: #050505;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .main-card {
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 20px;
            outline: none;
            font-size: 16px;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px var(--accent);
            transform: scale(1.05);
        }

        /* Контейнер для нашего плеера */
        .video-wrapper {
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            display: none;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 15px;
        }

        .history-list {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .history-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-card:hover { background: rgba(255,255,255,0.1); }

        .history-card img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2 style="margin-bottom: 20px; letter-spacing: 1px;">VOICEOVER <span style="color:var(--accent)">AI</span></h2>
        
        <div class="input-group">
            <input type="text" id="v-url" placeholder="Вставьте ссылку на YouTube видео...">
            <button onclick="startApp()">ЗАПУСТИТЬ</button>
        </div>

        <div id="status" class="status-badge" style="display: none;">Голосовой движок активен: Русский (Дубляж)</div>

        <div class="video-wrapper" id="v-wrapper">
            <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
        </div>

        <div class="history-list" id="history"></div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        let player;
        const synth = window.speechSynthesis;
        let voices = [];

        // Инициализация плеера
        document.addEventListener('DOMContentLoaded', () => {
            player = new Plyr('#player', {
                captions: { active: true, update: true, language: 'ru' }
            });
            loadHistory();
            
            // Грузим голоса для дубляжа
            window.speechSynthesis.onvoiceschanged = () => {
                voices = synth.getVoices();
            };
        });

        function extractId(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const m = url.match(reg);
            return (m && m[2].length === 11) ? m[2] : null;
        }

        function startApp() {
            const url = document.getElementById('v-url').value;
            const id = extractId(url);
            if(!id) return alert("Неверная ссылка");

            document.getElementById('v-wrapper').style.display = 'block';
            document.getElementById('status').style.display = 'inline-block';
            
            // Меняем видео в плеере
            player.source = {
                type: 'video',
                sources: [{ src: id, provider: 'youtube' }]
            };

            saveHistory(id);
            setupVoiceOver();
        }

        // ЛОГИКА ДУБЛЯЖА
        // Мы слушаем событие появления субтитров и мгновенно их озвучиваем
        function setupVoiceOver() {
            player.on('captionsenabled', () => {
                console.log('Дубляж готов');
            });

            // Каждую секунду проверяем текст на экране
            // Важно: в плеере должны быть включены русские субтитры (автоперевод)
            setInterval(() => {
                const captionText = document.querySelector('.plyr__caption');
                if (captionText && captionText.innerText !== window.lastText) {
                    window.lastText = captionText.innerText;
                    speak(window.lastText);
                }
            }, 100);
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = voices.find(v => v.lang.includes('ru')) || voices[0];
            utterance.rate = 1.1; // Чуть быстрее для синхронности
            utterance.pitch = 1.0;
            synth.speak(utterance);
        }

        // История
        function saveHistory(id) {
            let h = JSON.parse(localStorage.getItem('v-hist') || '[]');
            if(!h.includes(id)) h.unshift(id);
            localStorage.setItem('v-hist', JSON.stringify(h.slice(0,5
