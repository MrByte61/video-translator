<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceOver Ultra STABLE</title>
    <style>
        :root { --accent: #00f2ff; --bg: #09090b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .main-input { display: flex; gap: 10px; margin: 20px 0 30px 0; width: 100%; max-width: 600px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #27272a; background: #18181b; color: white; outline: none; font-size: 1rem; }
        .go-btn { background: var(--accent); border: none; padding: 0 25px; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; transition: 0.2s; }
        .go-btn:hover { filter: brightness(1.1); }
        .player-box { width: 100%; max-width: 950px; background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 1px solid #27272a; aspect-ratio: 16/9; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .video-wrapper { width: 100%; height: 100%; position: relative; }
        #yt-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .controls-panel { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 25px 20px 15px 20px; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .row { display: flex; align-items: center; gap: 20px; }
        .status-text { font-size: 0.8rem; color: var(--accent); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 4px; margin-top: 20px; font-size: 1.8rem;">VOICEOVER <span style="color:var(--accent)">ULTRA</span></h1>

    <div class="main-input">
        <input type="text" id="urlInput" placeholder="Вставь ссылку на видео с YouTube...">
        <button class="go-btn" onclick="buildPlayer()">ЗАПУСТИТЬ</button>
    </div>

    <div class="player-box" id="playerBox" style="display:none;">
        <div class="video-wrapper">
            <div id="yt-player"></div>
            <div class="controls-panel">
                <div class="row">
                    <div id="statusLabel" class="status-text">Ожидание...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, subtitleTimeline = [], lastSpokenText = "";
        const speechEngine = window.speechSynthesis;
        let russianVoice = null;

        function findBestVoice() {
            const voices = speechEngine.getVoices();
            russianVoice = voices.find(v => v.lang.includes('ru')) || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = findBestVoice;
        findBestVoice();

        function buildPlayer() {
            let inputData = document.getElementById('urlInput').value.trim();
            let id = "";

            if (inputData.includes('v=')) {
                id = inputData.split('v=')[1].split('&')[0];
            } else if (inputData.includes('youtu.be/')) {
                id = inputData.split('youtu.be/')[1].split('?')[0];
            } else {
                id = inputData.split('/').pop().split('?')[0];
            }

            if(!id || id.length !== 11) return alert("Неверная ссылка");

            document.getElementById('playerBox').style.display = 'block';
            
            if(player && player.loadVideoById) {
                player.loadVideoById(id);
            } else {
                player = new YT.Player('yt-player', {
                    videoId: id,
                    playerVars: { autoplay: 1, controls: 1 },
                    events: { onReady: () => setInterval(playbackLoop, 200) }
                });
            }
            fetchStableSubs(id);
        }

        async function fetchStableSubs(id) {
            const label = document.getElementById('statusLabel');
            label.innerText = "ПОДПИСКА НА ТЕКСТ...";
            
            try {
                // Прямой запрос к официальному парсеру субтитров без ограничений по IP
                const res = await fetch(`https://subtitles-youtube.vercel.app/api/route?videoId=${id}`);
                const data = await res.json();
                
                if(data && data.subtitles && data.subtitles.length > 0) {
                    subtitleTimeline = data.subtitles;
                    label.innerText = `AI-ДУБЛЯЖ: ГОТОВ (${subtitleTimeline.length} ФРАЗ)`;
                } else {
                    // Альтернативный надежный источник парсинга
                    const altRes = await fetch(`https://youtube-subs-api.vercel.app/api/video?id=${id}`);
                    const altData = await altRes.json();
                    
                    if (altData && altData.lines) {
                        subtitleTimeline = altData.lines.map(line => ({
                            start: parseFloat(line.start),
                            text: line.text
                        }));
                        label.innerText = `AI-ДУБЛЯЖ: АКТИВЕН (${subtitleTimeline.length} ФРАЗ)`;
                    } else {
                        label.innerText = "У ЭТОГО ВИДЕО НЕТ АНГЛИЙСКИХ СУБТИТРОВ.";
                    }
                }
            } catch(e) {
                label.innerText = "СБОЙ СЕРВЕРА. ПОПРОБУЙ ЕЩЕ РАЗ ЧЕРЕЗ 5 СЕКУНД.";
            }
        }

        function playbackLoop() {
            if(!player || !player.getCurrentTime) return;
            const currentTime = player.getCurrentTime();
            
            const currentPhrase = subtitleTimeline.find(s => currentTime >= s.start && currentTime < s.start + 2.2);
            
            if(currentPhrase && currentPhrase.text !== lastSpokenText) {
                lastSpokenText = currentPhrase.text;
                translateAndVoice(currentPhrase.text);
            }
        }

        async function translateAndVoice(text) {
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ru&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                const json = await response.json();
                const translated = json[0].map(item => item[0]).join('');
                
                speechEngine.cancel();
                const utterance = new SpeechSynthesisUtterance(translated);
                utterance.voice = russianVoice;
                utterance.rate = 1.2;
                speechEngine.speak(utterance);
            } catch (e) {}
        }
    </script>
</body>
</html>
