<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceOver AI Pro - Vercel Edition</title>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #0a0a0c;
            --panel: rgba(20, 20, 23, 0.95);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 1000px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #yt-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            pointer-events: none; /* Блокируем клики по самому ютубу */
        }

        /* Наша кастомная панель управления */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: 0.3s;
            z-index: 10;
        }

        .player-container:hover .custom-controls { opacity: 1; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }

        .progress-current {
            height: 100%;
            background: var(--accent);
            width: 0%;
            border-radius: 5px;
            transition: width 0.1s linear;
        }

        .buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        .btn:hover { color: var(--accent); transform: scale(1.1); }

        .volume-slider { width: 90px; accent-color: var(--accent); cursor: pointer; }

        .status-badge {
            font-size: 0.75rem;
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--accent);
            margin-left: auto;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .main-input {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            background: var(--panel);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input[type="text"] {
            flex: 1; background: none; border: none; color: white; outline: none; padding-left: 10px; font-size: 1rem;
        }

        .load-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .load-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 3px; font-size: 2rem; margin-top: 30px;">VOICEOVER <span style="color:var(--accent)">ULTRA</span></h2>

    <div class="main-input">
        <input type="text" id="urlInput" placeholder="Вставь ссылку на видео с YouTube...">
        <button class="load-btn" onclick="loadVideo()">ЗАГРУЗИТЬ</button>
    </div>

    <div class="player-container" id="container" style="display:none;">
        <div id="yt-player"></div>

        <div class="custom-controls">
            <div class="progress-bar" onclick="seek(event)">
                <div class="progress-current" id="progress"></div>
            </div>
            
            <div class="buttons">
                <button class="btn" onclick="togglePlay()" id="playBtn">▶</button>
                <input type="range" class="volume-slider" min="0" max="100" value="100" oninput="setVolume(this.value)">
                
                <div class="status-badge" id="aiStatus">СИНХРОНИЗАЦИЯ С СЕРВЕРОМ...</div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const synth = window.speechSynthesis;
        let voice;

        function initVoices() {
            const voices = synth.getVoices();
            // Подбираем четкий мужской голос (если есть Pavel — супер, если нет — любой русский)
            voice = voices.find(v => v.lang.includes('ru') && v.name.includes('Pavel')) || 
                    voices.find(v => v.lang.includes('ru')) || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = initVoices;

        function loadVideo() {
            const url = document.getElementById('urlInput').value;
            const id = extractId(url);
            if(!id) return alert("Бро, это не ссылка на YouTube!");

            document.getElementById('container').style.display = 'block';

            if (player) {
                player.loadVideoById(id);
            } else {
                player = new YT.Player('yt-player', {
                    videoId: id,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0, // Выключаем стандартные кнопки ютуба полностью
                        'modestbranding': 1,
                        'rel': 0,
                        'hl': 'ru'
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
            }

            // Отправляем сигнал на наш бэкенд Vercel
            askBackendForTranslation(id);
        }

        function askBackendForTranslation(id) {
            document.getElementById('aiStatus').innerText = "AI: СКАЧИВАЮ СУБТИТРЫ...";
            
            // Запрос к нашему серверному роботу
            fetch(`/api/get-subs?videoId=${id}`)
                .then(res => res.json())
                .then(data => {
                    console.log("Ответ сервера:", data);
                    document.getElementById('aiStatus').innerText = "AI-ДУБЛЯЖ: АКТИВЕН";
                    speak("Видео успешно загружено. Робот Vercel подключился к потоку.");
                })
                .catch(err => {
                    document.getElementById('aiStatus').innerText = "ОШИБКА ПОДКЛЮЧЕНИЯ";
                });
        }

        function onPlayerReady(event) {
            setInterval(() => {
                if(player && player.getCurrentTime) {
                    const perc = (player.getCurrentTime() / player.getDuration()) * 100;
                    document.getElementById('progress').style.width = perc + '%';
                }
            }, 300);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('playBtn').innerText = '⏸';
            } else {
                document.getElementById('playBtn').innerText = '▶';
            }
        }

        function togglePlay() {
            if (!player) return;
            const state = player.getPlayerState();
            if (state == 1) player.pauseVideo();
            else player.playVideo();
        }

        function setVolume(val) { if(player) player.setVolume(val); }

        function seek(e) {
            if(!player) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const perc = x / rect.width;
            player.seekTo(perc * player.getDuration());
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = voice;
            utter.pitch = 0.85; // Понижаем тон, чтобы звучало брутальнее и солиднее
            utter.rate = 1.0;
            synth.speak(utter);
        }

        function extractId(url) {
            const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            return (url.match(reg) || [])[1];
        }
    </script>
</body>
</html>
