<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VoiceOver Ultra Pro</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Главный контейнер */
        .player-box {
            width: 90%; max-width: 1000px; background: #000; border-radius: 20px;
            position: relative; overflow: hidden; border: 1px solid #222; aspect-ratio: 16/9;
        }

        /* Чтобы скрыть мусор Ютуба, чуть-чуть масштабируем само видео */
        .video-container { width: 100%; height: 100%; overflow: hidden; position: relative; }
        #yt-player { 
            position: absolute; top: -2px; left: -2px; 
            width: calc(100% + 4px); height: calc(100% + 4px); 
            pointer-events: none; 
        }

        .ui-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            background: rgba(0,0,0,0); transition: 0.3s; z-index: 10;
        }
        .ui-overlay:hover { background: rgba(0,0,0,0.3); }

        .controls {
            margin-top: auto; padding: 20px; opacity: 0; transition: 0.3s;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .ui-overlay:hover .controls { opacity: 1; }

        .progress-bar { width: 100%; height: 6px; background: #333; cursor: pointer; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent); }

        .btn-row { display: flex; align-items: center; gap: 20px; }
        .btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .btn:hover { color: var(--accent); transform: scale(1.1); }
        
        .status { font-size: 0.8rem; color: var(--accent); font-weight: bold; letter-spacing: 1px; }
        .right-side { margin-left: auto; display: flex; align-items: center; gap: 15px; }

        .main-input { display: flex; gap: 10px; margin-bottom: 30px; width: 100%; max-width: 600px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .go { background: var(--accent); border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 5px;">VOICEOVER <span style="color:var(--accent)">ULTRA</span></h1>

    <div class="main-input">
        <input type="text" id="urlInput" placeholder="Вставь ссылку на видео...">
        <button class="go" onclick="initApp()">СТАРТ</button>
    </div>

    <div class="player-box" id="pBox" style="display:none;">
        <div class="video-container">
            <div id="yt-player"></div>
            <div class="ui-overlay" onclick="handleTouch(event)">
                <div class="controls">
                    <div class="progress-bar" onclick="seek(event)">
                        <div class="progress-fill" id="pFill"></div>
                    </div>
                    <div class="btn-row">
                        <button class="btn" onclick="togglePlay()" id="playBtn">▶</button>
                        <input type="range" min="0" max="100" value="100" oninput="player.setVolume(this.value)">
                        <div id="status" class="status">ОЖИДАНИЕ...</div>
                        <div class="right-side">
                            <button class="btn" onclick="toggleFS()">⛶</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, subs = [], lastText = "";
        const synth = window.speechSynthesis;

        function initApp() {
            const val = document.getElementById('urlInput').value;
            const id = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.split('/').pop();
            document.getElementById('pBox').style.display = 'block';
            
            if(player) player.loadVideoById(id);
            else {
                player = new YT.Player('yt-player', {
                    videoId: id,
                    playerVars: { autoplay: 1, controls: 0, modestbranding: 1, rel: 0, iv_load_policy: 3 },
                    events: { onReady: () => setInterval(sync, 200) }
                });
            }
            loadSubs(id);
        }

        async function loadSubs(id) {
            const st = document.getElementById('status');
            st.innerText = "ПОДКЛЮЧЕНИЕ К РОБОТУ...";
            try {
                const r = await fetch(`/api/get-subs?videoId=${id}`);
                const d = await r.json();
                if(d.status === "ok") {
                    subs = d.subtitles;
                    st.innerText = "AI-ДУБЛЯЖ: АКТИВЕН";
                    console.log("Субтитры загружены:", subs.length);
                } else {
                    st.innerText = "ОШИБКА: " + d.msg;
                }
            } catch(e) { st.innerText = "СЕРВЕР НЕДОСТУПЕН"; }
        }

        function sync() {
            if(!player || !player.getCurrentTime) return;
            const now = player.getCurrentTime();
            
            // Обновляем полоску прогресса
            document.getElementById('pFill').style.width = (now / player.getDuration() * 100) + '%';
            
            // Ищем фразу для озвучки
            const entry = subs.find(s => now >= s.start && now < s.start + 2);
            if(entry && entry.text !== lastText) {
                lastText = entry.text;
                say(entry.text);
            }
        }

        function say(txt) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(txt);
            u.lang = 'en-US'; // Пока читаем оригинал, чтобы убедиться что звук ЕСТЬ
            u.rate = 1.2;
            synth.speak(u);
        }

        function togglePlay() {
            const s = player.getPlayerState();
            if(s == 1) { player.pauseVideo(); document.getElementById('playBtn').innerText = '▶'; }
            else { player.playVideo(); document.getElementById('playBtn').innerText = '⏸'; }
        }

        function toggleFS() {
            const el = document.getElementById('pBox');
            if(!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            player.seekTo(((e.clientX - rect.left) / rect.width) * player.getDuration());
        }

        function handleTouch(e) {
            if(e.target.classList.contains('ui-overlay')) togglePlay();
        }
    </script>
</body>
</html>
