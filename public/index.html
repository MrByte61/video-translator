<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceOver AI Pro</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .player-container {
            width: 100%; max-width: 1000px; background: #000; border-radius: 20px;
            position: relative; overflow: hidden; border: 1px solid #222;
        }

        /* Прячем мусор от YouTube за границы видимости */
        .video-viewport {
            position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden;
        }
        #yt-player {
            position: absolute;
            top: -10%; left: -1%; width: 102%; height: 120%; /* Растягиваем, чтобы скрыть лого и титры Ютуба */
            pointer-events: none;
        }

        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px 20px; display: flex; flex-direction: column; gap: 10px;
            opacity: 0; transition: 0.3s; z-index: 100;
        }
        .player-container:hover .controls { opacity: 1; }

        .progress-bar { width: 100%; height: 5px; background: #333; cursor: pointer; border-radius: 5px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 5px; }

        .btn-row { display: flex; align-items: center; gap: 15px; }
        .btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; }
        .btn:hover { color: var(--accent); }
        
        .right { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        select { background: #111; color: white; border: 1px solid #333; padding: 5px; border-radius: 5px; cursor: pointer; }

        .main-input { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 600px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; }
        .go-btn { background: var(--accent); border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>VOICEOVER <span style="color:var(--accent)">ULTRA</span></h2>

    <div class="main-input">
        <input type="text" id="url" placeholder="Ссылка на YouTube...">
        <button class="go-btn" onclick="start()">ЗАПУСТИТЬ</button>
    </div>

    <div class="player-container" id="mainContainer" style="display:none;">
        <div class="video-viewport" onclick="togglePlay()">
            <div id="yt-player"></div>
        </div>

        <div class="controls">
            <div class="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="pFill"></div>
            </div>
            <div class="btn-row">
                <button class="btn" id="pBtn">▶</button>
                <input type="range" min="0" max="100" value="100" oninput="player.setVolume(this.value)">
                
                <div id="status" style="font-size: 0.8rem; color: var(--accent)">СИНХРОНИЗАЦИЯ...</div>

                <div class="right">
                    <select onchange="changeQ(this.value)">
                        <option value="default">Качество</option>
                        <option value="hd1080">1080p</option>
                        <option value="hd720">720p</option>
                        <option value="medium">360p</option>
                    </select>
                    <button class="btn" onclick="fs()">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, subs = [];
        const synth = window.speechSynthesis;

        function start() {
            const id = document.getElementById('url').value.split('v=')[1]?.split('&')[0];
            if (!id) return;
            document.getElementById('mainContainer').style.display = 'block';
            if(player) player.loadVideoById(id);
            else {
                player = new YT.Player('yt-player', {
                    videoId: id,
                    playerVars: { autoplay: 1, controls: 0, modestbranding: 1, rel: 0 },
                    events: { onReady: () => setInterval(update, 500) }
                });
            }
            fetchSubs(id);
        }

        async function fetchSubs(id) {
            document.getElementById('status').innerText = "ЗАГРУЗКА ДАННЫХ...";
            const res = await fetch(`/api/get-subs?videoId=${id}`);
            const data = await res.json();
            if (data.subtitles) {
                subs = data.subtitles;
                document.getElementById('status').innerText = "AI-ДУБЛЯЖ: ГОТОВ";
            }
        }

        function update() {
            if (!player || !player.getCurrentTime) return;
            const time = player.getCurrentTime();
            const perc = (time / player.getDuration()) * 100;
            document.getElementById('pFill').style.width = perc + '%';
            
            // Пытаемся найти фразу для текущего времени
            const phrase = subs.find(s => Math.abs(s.start - time) < 0.5);
            if (phrase && !synth.speaking) {
                // Тут пока английский, на след. шаге добавим перевод!
                const u = new SpeechSynthesisUtterance(phrase.text);
                u.lang = 'en-US'; // Пока читаем оригинал, чтобы проверить звук
                u.rate = 1.1;
                synth.speak(u);
            }
        }

        function togglePlay() {
            if (player.getPlayerState() == 1) player.pauseVideo();
            else player.playVideo();
        }

        function fs() {
            const el = document.getElementById('mainContainer');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }

        function changeQ(q) { player.setPlaybackQuality(q); }
        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            player.seekTo(p * player.getDuration());
        }
    </script>
</body>
</html>
